front:
  text: 悟眞集卷下連三
  hash: sha256:86ca07beb701cb9b5f561061d382deca3cbb359e9695875268a5f75812ba2552
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0053_SJB_002-250644c, image: sjb/25/250644c.png}
body:
  text: 錦屏山通玄子李先生集詩勸修行早離鄉修行不遠離親愛只爲當生泥水倩元本因他泥水成下梢管被泥水壞釣馬先生未許苦海漂流欲釣鼇見鼇不敢下鈎撈柰何一派傾舟浪怒捲風波轉更高内觀心月自家宫闕徹天寬高掛團團白玉盤皎潔清光無翳障簾幃深鎖恣情觀鎖猿赤帝山中黑色猿攀花摘果耍難收而今打得金剛索鎻在黄庭不舉頭繫馬靈臺赤馬太驕肥愛對風前月下嘶幸得民安無戰陣舊槽緊繫不牽騎問一朞不岀菴結制生涯戊己家慇懃特地造三車琢開古轍崑崙過大道周流無障遮痛飲刀圭灌玉花醉眠一任日西斜客來幾度敲門喚一夢遊仙尚未家壺中境天内一天少見知無生眞境此爲基道人箇裏曾遊歷休問修行無有爲試筆心手相忘玉管揺聲如寒雨響瀟瀟不離繭紙兩三幅寫出龍蛇千萬條春愁人被春來苦不忺等閑難上我眉尖尋思白髮無情理不問主人添便添謁袁權府三秋雨過曉風悲深慮寒生試問衣小富欲成近大富柴扉故掩謁朱扉誡謗傲萬慮沉沉一氣沖朝昏常在杳冥中人來話我我慵語識破人間事事空錯認聲色堂中休覓佛馨香洞裏莫尋仙請觀猿摸波間月影動方知不是天雪雲生風送雪霏霏誰識乾坤造化機碧玉峯前童子笑黑牛變作白牛歸夢飲意倦琴書卧小軒夢隨劉阮酌桃源醒來復醉醉還醒寂寂無人啼曉猿同人見訪昨感良朋蠟屐來東臯笑傲晚慵迴樵童侍我臨流坐不賦新詩亦快哉養志收拾琴書歸去來鶴全毛羽蛤成胎得衝霄漢渾無礙高衒神珠晃九埃警送孝臭腐化神神化臭輪迴一舊一番新明知物理渾如此何事生人送死人居山蟠跡茅菴已數年等閑無事不山前莫言閑樂不由己自是人心著萬縁屋上峰巒映夕陽半林紅翠匝茅堂茶餘客去柴門掩閑弄流泉趁晚涼别河津和馬先生韻樂寓山菴未卜歸征鴻喚省思依依如今已得逍遥趣擬學孤雲自在飛道人心似白雲閑動止從容自在間憶出谷時便出谷要歸山則即歸山嘆生死行尸休爲死尸悲父去看看子亦隨陰簿星星明有限只爭勾早與勾遲月夜風收雲幕露青天天地冰壺冷湛然萬點星疏銀漢淡一輪明月正孤圓陽火陽光上越一重天下徹無疆九壘邊星月伏藏陰怪滅一輪赫赫顯孤圓牧牛牧童晚唱樂江邊放下白牛不顧牽寂寂蘆花煙水外一輪明月照青天自樂外無煩惱内無思不醉不醒不即離何事道心清樂處碧天風細月明時警昧眞心共說修心不識心眞心别隱洞天深欲知不問修眞士走遍天涯無處尋寄楊先生大法堂前授劍時囑教付與丈夫兒柰何落在雌柔手匣内悲鳴孰可知勸學天元眞氣上天梯收拾栽培要灼知全會始終無退倦只爭成早與成遲警貪求蠅頭利賂十分追不恤人難任四知一旦積成盈貫罪取招業債倩烏誰諫招後言忠言十九不機投面苟相從背變讎范蠡悟來無後患夫差徒見子胥羞賤利名歸去來兮雪滿頭利名心上撆然休當機抵了輪迴債也是今生贏一籌幽居欄檻數竿君子竹矮窗幾卷聖人書遊仙夢斷松陰轉一操絲桐樂有餘内巧吹紅海底一爐火消却山頭兩片冰火自滅時冰自盡日光月色共圓明嘆道寳陶甄大璞作生涯耀古輝今無玷瑕放去收來天地窄崢嶸神用應無涯雪後調琴閑樂絲桐取次調坐親爐火恣逍遥貪憐徽外琅然曲不管門前雪未消晝眠晝寢明窗况味高心頭塵慮絶纖毫甜然半覺遊仙夢又向壺天看一遭兵後遊河中府舜都樓閣冠天下幾逐灰殘幾度修唯有條山林麓在巍巍依舊過春秋寥陽宫西軒西軒高卧性朦朧飲醉西風混太空空裏幾多眞變化樂然分付不言中寂寂西軒遠市鄽寬藏法界我深憐侯門人到慵相對獨稱閑人宴坐禪西軒雲憩枕書眠瓦鼎山檀裊瑞煙一味清音偏貫耳瑶琴風鼓自琅然登鸛雀樓觀河地上長河天底山天吴怒激浪迴還爭如樓上無名客不起風波自在閑夏日晚興自南薰吹晚生凉散褐横琴對夕陽三弄聲殘明月上矮童來請夜燒香初春雨後膏雨初晴日漸長輕寒猶自勒羣芳道情樂景憑誰說獨傲東風立夕陽寥陽宫早起幾韻金鐘送曉寒遊仙夢斷不成眠起觀太華峰頭月斜照條山影浸天文秀才問道常道眞常常自知知常常道乃無爲無爲爲得無言說說著眞常道即離寄山南任先生塵談一别十年間幾見賓鴻謾往還望斷前山風月底想應一様養高閑贈張先生入圜禁身禁足勤行道忘相忘言宴坐禪大覺圓通明五眼不離當處是羅天嘆日月催促纔過中秋皓月圓又逢重九菊花天四時直恁催人老攛掇一年又一年警敏喪生死朝昏事不訛壽長壽短一南柯臨喪莫起悲酸念輪到頭來柰爾何重遊河中四十年前此地遊繁華幾換度春秋黄河不在興亡彀依舊滔滔東注流幽居晚步麻衣拂地瘦笻長踏破雲山正夕陽回首黄昏香火罷笑披風月入禪房嘆害人者人害蟫噪松枝興未休螳螂牙爪利如鈎一心只慕甜蟬味豈顧黄鸝在後頭明守分平生無作爲禀性太愚癡一鉢千家飯三冬百衲衣般般常足意事事不愁眉何爲窮能固玄元說儉慈秋赴河津立菴讚貧蓑笠離桑梓時當霜葉天琴書抛我友瓶鉢謁他賢瓦解霜侵榻簷頽雨滴椽虎狼蹤户外苔蘚滿窗前行訝顔淵巷眠偎后稷綿几無龍尾硯架絶鴈頭牋淺蘸秃毫筆濃磨破竈煙興題袁憲傳閑閲范丹篇不怨人深恪常思己薄縁固窮心不濫抱道志彌堅杳杳冥冥坐昏昏默默禪幻軀培丈室眞性透重玄内外融無二縱横滿大千五行難造化二氣罷催煎極樂清涼境逍遥自在仙妙機無可說緘口待天年警門人修行莫盲志戒精誠天崩莫懼地陷休驚下忘貧賤上傲公卿鬧中取靜死裏逃生内全淨體外絶人情圓明五眼證果三乗斯言再囑余弟余兄鸞飛眞跡跛鼈慵行面從背毁財重義輕樂從猿耍動學雞爭性迷聲色意在功名問君端的曷幹前程遺世頌人聽清角不聞雷震我今歸去大限有盡好事擬說說也難信余弟余兄道之可進悟眞集卷下
