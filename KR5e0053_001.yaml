  text: 悟真集卷上連二
  hash: sha256:eb64bdda36ef949a5ded620f81e43f33fae6311d80e6d9bd26669ce06854dbb9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0053_HFL_001-001a, image: hfl/0791/0791-078.png}
body:
  text: 錦屏山通玄子李先生集燒藥包歌藥包藥包離我肘二十年來作知友也曾因你服綾羅也曾因你歡花酒有貧有富百千家無日無時編户走昧井榮迷寸口灾上添災亂針炎積行行功爲你無是非冤業因伊有今朝燒你没狐疑只爲儂心不仍舊藥包冒火奮神威聲出如雷聒天吼較些我送你鑊湯你悔身心先下手福源清罪根朽踊身跳出塵凡彀障山千丈勢凌雲苦海千尋浪衝斗天道高兮有甚高地道厚兮有甚厚地有竅兮天有梯日月陰晴没昏晝青雲白氣淨時交黑霧紅霞空裏鬥混合中央結寳光光明直徹青霄透无形妙體樂平生一様大虚無極壽昏鏡歌嗟昏鏡嗟昏鏡淨體不堪塵惹定拈來堅確有銅形面目比初渾不瑩模様雖然依舊圓中間昧了圓明性欲施妙藥復揩磨洗滌從前穢污病全身透脱得玲瓏照破他人不端正玉匣深藏入洞房地久天長常清淨悟謾勞歌悟謾勞悟謾勞悟來甘分啜醨糟首陽山色枉含恨汩水波翻空怒濤十陣功成誅首劍一場拒諫剖心刀古人未識逢斯害何事今人識又遭明可現暗可韜知難不退亦愚曹焚尸吞炭三思短擲瓢埋輪一著高我輩庸夫痴且拙紆青拖紫騁英豪速宜决斷收三寳莫待遷延白二毛夢中省物外逃輕裘羅帶換麻袍瘦笻七尺敲龍杖纇線三尋縛虎絛布袖拂開無事路草鞋踏破有情牢長明宫裏栽金粟生氣園中種玉膏雞化鳳鯉變鼇修眞志氣抹雲高聲騰絳闕能鳴道渾似仙禽唳九臯村醜歌二儀高厚爲奇耦萬物生成從此有萬物之中貴者人人身幾箇能貴守昨朝自嘆我今生無辱無榮謝天祐也曾聚散結英豪不被飢寒事箕箒而今老矣舊形骸深恨傍人笑村醜如聾似瞽半呆痴跛足弓腰緘利口等閒不敢向人開吐出忠言益知友華池斡轉八瓊漿澆灌無根樹不朽别人忙亂有中無我咱活計無中有或夤夜或白晝坐卧住行忘體究寂然澄定不時間斡動天輪運機臼地氣騰天雨驟漲溢江河充宇宙龜隨蛇引覓爭馳虎嘯龍吟競交媾重樓棟宇玉崢嶸京山穴窟靈風吼乗此風昇返太空遠徹天門衝撞透香雲馥馥捧蟾光瑞靄霏霏罩星斗修行莫道不艱難徒恁知他恐爲謬到還未到誓須到就還未就終要就發弘誓願爇心香乞與仙師共長久嘆不識性命歌修行不識眞空性膠漆盆中磨垢鏡用盡功夫磨更磨到頭難得圓明瑩眞空性眞空性無色無聲難視聽隱顯虚空空弗空尋之不見呼之應修眞不識眞元命摘葉尋枝强鬥釘空見苗生秀不實失養元精果難證眞元命眞元命太極分形爲本柄萬物無爲造化中功超造化能成聖只修命不修性恰似烏金飾頑磬打碎頑形空落空終身未免沉空淨只修性不修命水火不交如墮甑命不全兮性不眞頑空空亦遊陰境修之性修之命出脱來時迷昧病性命兩全玄又玄一超遠離輪迴徑嘆世知已歌混元樸散兮物形貽物滅物生兮寒暑推世泰世凶兮人孽兆情哀情樂兮事合離有身有性兮來且昧壽長壽短兮去又迷我因悟此兮遠離害閑居陋巷兮心自懷一年過隙兮春秋變一晝轉頭兮暘昧移竹籬茅舍兮逍遥我名場利陣兮榮辱誰是非蠻觸兮辨休辨煙霞蓬島兮期可期無爲大道兮鬼神重徹底至眞兮天地知恨不逢知音歌道家活計兮人難覓縱逢覓者兮工他術圖名索利兮外相嚴迷言滯教兮内功失道體微德用密淨赤條條空寂寂說時莫說他徒迷憂時只憂自不及君不見千流萬派兮浪雖殊得源得流兮終歸一又不見殊途異徑兮步即差知轍知軌兮同啓迪恢弘本性兮體動靜之圓明養育眞命兮剖乾坤之變易面墻宴坐兮訪達磨之遺風高枕恣眠兮效希夷之芳跡性停命住兮得杳冥之自然玲瓏禪定兮顯靈源之消息或夢入於洞天或飛行而遊逸或玉女以携漿或金童而捧敕三千功雖未滿足姓名九轉金丹籍異日圓成功標仙曆問聞斯行則理必精通願安承教者頓蠲迷執忠告言須委悉切恐因循虚度日性鑑昏時旋擦磨心燈暗處勤挑剔保氣精鍊神液朝種暮收須自識箇中玄關是眞修此地不修修甚的舌上圓通心未通内假外眞衒粧飾豈不聞子期身喪兮伯牙之琴閑又不聞張華命逝兮劍雄而孰擊既而見用方丈一席蟠蟄身若也無拘天涯四海飄蓬力願逢同契話行藏呼吸虹霓吐胸臆因道友惡疾歌嗟哉嗟哉這箇形骸既有也因何死去既無也爲甚生來爲當是你能販首不知是我愛投胎糞材糞材送我輪迴今番撇下儘拖儘埋莫對畫棺澆酒奠休尋綵轝挽歌抬上士讚揚下士笑一場兒戲送身媒心切切口咍咍冗冗人情魚陣排揺頭不認無生餌收拾綸竿下釣臺萬古清風拂襟袖一輪明月照蓬萊貽囑門人歌召門弟子聽少有忠言囑我病也休醫我去也休哭三寸眞氣無四體尸筋骨送莫綵花棺宅莫陰陽卜休占吉凶時便瘞雲煙谷盤薦罷閻閭賻儀閑骨肉無罪住人天有罪歸地獄莫求賢聖慈莫畏鬼神族設憑讚詠功脱體罪難贖有箇出塵機預備修眞福七言述懷清閑無事志超然糲食麤衣絶萬縁日倦罷看殘畫軸手慵不續斷琴絃息心常是耽詩債樂性何憑買酒錢伸屈任隨縁分過萍蹤蓬跡度流年貧甘鶉結弊袍單不畏狂風透骨寒恐動一身慵洗面怕勞十指不簪冠困眠石榻清還爽興坐綿窩暖又寬頓覺身心人彀外雨傾徵發不相干自樂利鎻名韁滿世間傭貧且喜得安閑心頭白境多殊勝身外紅塵任往還無爭豈消投洞水棄榮何用隱商山柳陰深處繩牀穩默默終朝不啓關述懐警衆心頭無事氣神和歌罷狂吟又載歌芝草榮華含地氣瓊漿流轉貫天河剪除俗念存仙念趕退詩魔作道魔會得這些魔意思教君比我更魔多善惡同生用不同兩般元出一心中慈言喜作養花雨怒氣休爲送雪風鳳屋門前栽柳老虎窩村外種瓜翁古賢不是無能智念道忘言樂固窮警世害衆舌香腹臭惡駸尋交結令人陷陸沉令色敢違承色戒巧言徒昧愼言箴欺心起處心違口誑口開時口昧心休恁只謀長得勝敗來禍取海般深勤修悟眞莫戀五湖水心了休遊萬疊山顚倒乾坤昇降裏捲舒雲雨吸呼間五行鍊就三田寳萬化驅令九氣還六尺皮囊無作相更因何事不清閑暇日述懐門柳庭松地種瓜藥爐經卷老生涯戲驚啼鳥敲芳樹閑引遊蜂弄野花襟袖舞風從展轉簪冠枕石任欺斜有人笑問安棲處萬疊雲深是我家與張大師叅同大道無爲本自然假禪勘合見眞禪性融空色無分别命扣陰陽會倒顚足底風生身翼地頭邊月照背磨天初心誰信無中有鸞鶴翱翔不用鞭餞張公之陜西物外幽人不易逢喜迎愁送意無窮德光散作秦川雨道氣空遺晋地風今日載言載笑裏後期一有一無中仙都揮塵雲霞外肯齒萍蓬皓首翁誡倦塵勞本務塵勞作悟頭塵勞反倦恣貪求一番造作拊心懊百念艱難徹底憂七魄儘隨縁孽散三魂任自睡魔偷若沉此理爲修養何日登臨法海舟勸未悟首者修行未掩五重關豈解神機鍊九還空執持齋爲淨戒謾尋服餌駐童顔五行不出陰陽彀二物全拘造化間省得無爲無相理不離不即樂閑閑誡耽書捜羅塵念枉顰眉損益從來是兩歧千卷古書儒士解一壺仙景道人知少年且歷人間事壯歲須尋大道基爲報聰明宜早辨莫教伶俐變成癡弔衛先生弔君終日撫雲棺决了全眞果的端蟬入青霄金殻冷鶴歸紫府玉巢寒悅隨風月三天上高立清標萬肚看再啓蓬萊諸道契未期相會穩驂鸞寄王先生背道向書苦閲三墳敏九思終焉計劣謾羈縻好依孔聖四禪頌盍奉純陽百字詩七返九還功就日三乗一了道全時碧天皓月清懷抱羨甚身榮折桂枝初冬有感秋光纔盡又冬隨北帝功施料峭期白草交加三徑滿彤雲黯淡六花吹收心急悟悟來晚下手速修修太遲堪嘆飄飄紅葉落還元云是入窯時雪四合彤雲似有期風催飛雪遍天涯蓼汀蘆岸同銀色野樹家梅一様枝嫌少孫公窗外夜恨多韓相馬前時茶餘煙暖無餘事論到仙花葉上詩問修行始終迷徒欲識道人修煅煉純陽就則休三尺腋囊盛快樂一條手拐撥憂愁青山可住優游住緑水堪遊笑傲遊有客問予歸去路無言笑指白雲頭和王志隱新春革故東君造化知鼎新春色景熙熙鶯遷喬木風猶軟燕近尋巢日漸遲半雨半晴桃露臉輕寒輕暖柳舒眉一年一見一回老白髮功名總爲誰勸友人感春君多春感没來由假見春光有甚愁一歲但逢一歲了百年過盡百年休好消舊孽新縁結恐墮來生今肚修咫尺壺天極樂境大開門户少人遊天道融和次第春乾坤泰象正交通根荄陶鑄五行裏芽甲栽培二氣中歌管畫樓風細細輪蹄紫陌雨濛濛試看結實從花後盡在深根固蒂功無常推訴難獰鬼驅馳推訴難千金不諾買開顔豪家豈許貧家替今日何容明日攀寂寂紅樓人院落漫漫黑霧鬼門關奈何無限悲酸苦盡出平生愛念間誡酒覽古尋常怨杜康與人爲害酒爲漿腐肝腐肺傷難解瘖胃瘖腸病怎防引惹風波傾命水顚狂神思辱身湯勸君但飲休過度縱不妨人己自妨嘆孽招水旱造化陰陽氣不調蒼生孽力自相招貧民諂佞奸民詐富者奢淫貴者驕夏月反寒涼月暑雨時成澇旱時焦年饑不足人多疫已黷天公未見饒寄劉先生久别仙顔一别十餘期肺府深銘引領思縱有良辰歌舊曲殊無風便寄新詩雖然夢到言難到終是身離心不離幾許臨歧腸斷處春風淡淡日遲遲寄張先生傭跡西山爾據東鱗鴻不見信難通身心動止春飛絮蹤跡逍遥秋轉蓬六府無塵清淨裏三山有路杳冥中步雲一著休教昧恐屬因循白髮翁初夏河津雨夏初雨力富農家斷送豐登不足誇桑椹半香籠赭色櫻桃近熟襯丹霞院前院後椒成顆村北村南麥放花翠柳緑槐深影裏軋聲不斷絡絲車山堂夏日闃寂山家夏日深清凉一味滌塵心披襟揀坐溪邊石策杖尋行柳下陰旋折野花閑引蝶猛敲芳竹戲驚禽貪看螘陣撩童笑不覺天西日半沉度日騰騰兀兀度光陰名利蝸蠅更不尋鼎内夜勤三捻炷窗前朝樂一張琴杜鵑啼破華胥夢齊女呼醒禪定心誰識箇中閑活計旋收白玉鑄黄金寄陳講師一别仙翁渺邈間游思教墨鴈南還煙迷曲直重重水雲映高低疊疊山石硯有塵經月暗柴門無客繼朝關蒲團竹杖移陰坐北顧掀髯逸駕攀寄辭史元帥結交俊乂樂平生行止常思寵辱驚臂裏雖無扶轂力喉中端有喚雞聲當時對語多忠節今日傳言愈至誠徒指良辰期會面死生不得稱衷情述懷看甚人顔折甚腰青山雲水路非遥老松豈逐霜寒謝璞玉那從熾焰燒雞唱遠聞三里耳鶴鳴低徹九重霄兩忘榮辱知何享抱道簪冠樂寂寥遠訪陳講師足繭重生汗若霖不辭迢遞訪知音義從肯讓丘山重恩顧迷連江海深閑客性磨門客性達人心鼓達人心風生席上憑高價一笑都還直萬金警仗勢難久數關人事有興廢冬去春來無古今駭浪成紋空聚散閑雲藏雨謾晴陰前程倒指尅期盡往事回頭何處尋試卧東風成午夢覺來紅日早西沉誡僧恃强冷笑緇衣話太過直饒獨擅待如何幾般口裏剜坑塹三寸舌頭結網羅鑑垢尚存仍點污囊錐已利更揩磨饒君深抱荆山玉愁甚人間没卞和自嘆白髮簪冠老道流一生天賦得優游今朝不入他人彀明日從渠亦自由七十人稀六十壽三千仙果二千修昨非今是生涯了興即歌吟倦即休重九冒寒謁友重陽風葉動蕭騷斷送寒威徹弊袍遍體粟生驚凛冽哦詩齒震謁英豪我深有意呈千首他只無心拔一毛那更狂朋不我恤柴門杖擊喚登高裴先生坐化夜夢金童捧詔宣今朝羽化老裴仙一靈豁達歸眞矣四大端嚴貌儼然躍化龍威投海島翱翔鶴力上羅天而今而後修眞子少與先生可並肩嘆休心當時體段學風流年老駸尋萬事休名利盡隨流水去是非都逐落花收懶干風月疏詩社怕屬顚狂厭酒樓有客欲論榮辱事幾番緘口一揺頭述懷警門人飲醉刀圭卧草廬杳冥别境證功夫朱龍穩跨遊金闕玄鶴相扶翫玉壺萬變定時三界靜九天晴日一輪孤不知多少修眞子此箇家風得也無警世時危不用直臣籌認得膠盆莫剌頭雲夢韓侯無罪滅杜郵白起有功囚碧松林下高低廟芳草堤邊新故丘試向碑間觀舉止都無一箇稱心頭勸俗知叙俗眼艱窺道者流箇中别運妙機籌一輪明月中天淨兩件神光内境收長短卦爻從補坼丙庚水火自添抽春雷一震飛寥廓淨體縱横天盡頭已覺功名不遂成歸來寵辱兩無驚内收瞳子休觀色外鎖舌頭不有聲心似半篙潭水靜身如一片野雲行追思往事仰天笑險被空花悞一生寄門人先生學書何事先生厭草廬不親有道只親儒苦貪架上三墳義豈顧壺中七寳珠强咤有縁榮利禄不知無分淨功夫老骸病目看看近應也長吁自嘆愚誡執者學道先須誡執剛執心自擅作强梁相如避路忘顔厚廉氏携荆乞罪當和氣至柔穿厚地泉流雖弱貫高岡處謙受益終無咎違衆超羣大不祥自樂衝開地網撞天關穩跨飛龍恣往還眼底便知爲極樂座中深曉是蓬山忙忙二曜從渠速湛湛一眞自在閑了不了兮休理會從教白髮笑配顔問法眷弟兄問君心事莫生嗔端的修眞要遇眞教雨洗除心上垢道風蕩散眼中塵一壺變化夢中夢三界飛行身外身此箇玄玄還不信更將何物號陽神警妄也曾求道也叅禪遍歷雲山不記年和尚發言誇佛種道人開口騁神仙六經十論文徒昧七返九還功妄傳已受皮囊囚禁苦猶言父母未生前寄雷祐之大軍後病中恢恢天網密牢籠孰是常安覆載中多少合離多少恨一番興廢一番空風前陌上屍猶臰雨後沙場血尚紅試問當年貔虎士幾人得到白頭翁自叙警輕命世亂年凶事足諳抽頭隨分養眞憨當年小子百千萬今日老翁一二三性命無根鈎上鯉形骸有限繭中蠶榮枯分定無差失休使欺心分外貪嘆道性珠無様抱重玄應變縱横得自然豁逹諸方明徹底經營萬彙體隨縁隱時寂寂歸毫末顯即虚虚塞地天本是一般無礙物崢嶸神用果無邊誡貪愛索纏身發嘆聲始知地就害還成畏針當眼培荆棘怕陷當途撅塹坑禍是愚人福裏出福從賢士禍中生英雄若不陰公判項羽東吴再起兵誡妄說欲話玄中顚倒顚須遊天内一重天心還有物休論道性若無根莫論禪初地不栽泥裏藕下梢怎結水中蓮莫將聖典狂猜解準擬身招妄語愆宋眞人垂訓河中披雲大闡歷人間一載河中兩復還拔度德光開九獄慈悲威力震三山吸呼離坎陰陽變舒卷風雲天地閑爲報世人從此後不迴向善大愚頑夜坐迢迢夜色正三更玄體飛行出玉京風歛野雲千里淨光浮滿月一輪明銀星點點寒光白碧漢澄澄浩氣清何事日烏離海上一聲鐘送定初驚樂境大道淵兮在内觀淡乎無味有眞歡清風氣透三山遠明月光飛萬里寬不約高低從變化奚分内外樂盤桓醒來獨對何人說盡付松風一操彈道無二釋道從來本一源如來老氏共登天箭穿鐵鼓藏深理爐煉金丹隱至玄白馬東來傳祕語青牛西邁吐眞詮而今而後緇黄輩徒向丹書竺誥研贊知進退閑來倒指點英豪越相劉侯一著高三卷聖書垓下祕一籌神變會稽逃西施謾展羅鵰網吕后空施陷虎牢小智欲謀成大事一如魚餌釣鯨鼇答人問閑既慕林泉笑傲閑便將瓶鉢伴青山陰符道德經三卷蓬牖桑樞屋兩間紫府靈禽勤接送丹山逸駕旋追攀坦然心上無餘事滿院松風晝掩關趙白二仙墳守而禮問夜闌寳炷裊輕絲對塚披肝祝二師八百行修成甚日三千功累就何時人間蓬島猶難見世外羅天豈易知願入夢中明點破捨身志道待歸期慇懃凭塚問行藏謹爇心頭一炷香索索固窮三十載惶惶冒死幾千場住行坐卧百骸老游息藏修兩鬢霜一著無生今未了不忠不孝罪誰當值人見棄擔簦訪道片雲身漂蕩天涯二十春緑鬢叅同多有益蒼顔歸故近無鄰朱門肯顧柴門客狐褐誰憐枲褐人海島仙山歸未得任伸任屈養天眞樂貧四更鼓罷市聲誼我正齁齁恣意眠蓋片紙衾枕塊石鋪條蒲席襯堆綿或隨白鶴遊蓬島忽跨朱龍看洞天此箇話難人世說枉教名利笑風顚中秋賞月雲消塵歛半秋天星斗分明月正圓白玉樓頭誰品笛水晶宫裏我調絃瑩浮海嶽冰清爾光浸乾坤冷湛然自古年年唯此夜世間何處不遲眠上平陽廉訪使百姓嗷嗷苦莫當大僚經過便清涼温辭撫俗寒添纊潤德霑民渴遇漿到處威無風雨惡隨方名噴麝蘭香流風不令朱門懼秖聽雷音賜寵光送王進之離盃瀲灧送知音握手愁傾淚滿襟窄徑危橋當顧嶮亂山孤館莫無心落霞紅葉荒村遠曙色清霜野渡深杖履天涯雲水遠未期情復蟻羶尋囑楊先生與君特地話行藏道在清貧當自强緊鎖五關身有益謹持三寳行無妨薦賢舉善得雙美安己讒他必兩傷君子所爲須願學自然福蔓與天長道人作止果非常德要謙謙志要剛慧劍高揮羣怪避刀圭爛飲萬邪藏五霞鼎内烹金蘂七寳爐中煉玉漿造化眞修成健體通天徹地路堂堂嘆時離塵在道莫心違天地推遷世改移察察小人剛長日謙謙君子道消時灰心讓印垂三顧冰哂辭金畏四知大抵孽縁休理會不如塊坐樂無爲誘衆學仙一段妙機關盡在生成造化間水火推移逢即返木金動變遇須還二輪日月陰陽息六合乾坤天地閑此箇功夫行得到始知隨處有蓬山勸門人舌了心頑學道人叮嚀忠告莫爲嗔青春暗去年年老白髮潜來日日新愛念重添心上垢榮觀收拾眼中塵一朝耗蕩元眞盡伏枕空嗟道遠身警虚度當時釣爾不迴頭縱得迴頭亦妄修木上求魚勤旦暮水中捉月度春秋幽明寵辱短長夢神臭榮枯多少愁試拭青銅看皓髮今年更比去年稠壞袍袍壞渾無一線聯莫尋綱領不容穿四襟方竅與圓竅兩袖長懸復短懸濯垢條條隨水去拂塵片片逐風顚而今卧月眠雲裏儘赤條條度晚年警妄解圓覺圓覺眞經無可說强談圓覺廢功夫空圓覺了元無跡大覺圓成顧絶模漚没漚生空聚散雲來雲去謾馳驅還知不說爲眞說未肯人前鋪席鋪寥陽宫夜坐獨坐寥陽夜已闌銀河耿耿月華寒琴彈折桂姮娥聽劍舞誅龍鬼魅看八面玲瓏冰鑑闊一天澄湛玉壺寬人間多少利名客不識簞瓢抱大丹誡人妄解書狂猜妄解誑談論不識眞常道蒂根手掬途泥揩堆子口含漆水洗膠盆張良指是孟良叔楊子呼爲柳子孫也待升堂謀入室豈知遠隔幾重門勸道人可遠鄉修行切要遠離鄉不歷雲山道有妨月色到天元皎潔水流入海自汪洋絮綿離柳飛南北蠻觸辭蝸絶短長竈底無薪火自滅豈勞指沸旋揚湯警居菴幹私得莫歡娱失莫愁幻軀六尺水浮漚今朝有喜今朝樂來日逢愁來日憂一息不傳爲朽骨半星皮臭是骷髏聖賢遺教佯聾瞽甘爲兒孫作馬牛誡妄修學道元須玉奬金天元眞息理深深不於固蒂根頭覓枉向空花梢上尋專氣保精能實腹抱元守一自虚心知他多少惺惺病不肯教人療一針警親終南疏永樂黄粮夢齗教爲基雲指重陽作祖師千里終南心喜去一程永樂脚慵移實從花後本來見根在苗先自古推曩日人謡今可信始知皮較一皮皮夏日憩純陽宫麥天誰不畏炎陽禪榻松風氣味凉茶乳滿甌清露冷檀煙結蓋白雲香性中空色都融攝心外塵勞得坐忘卧看條山雲自散日移花影上東墻勸劉子高道人器宇别持操不恥終身弊緼袍方外注心方外友世間著意世間曹志須似水麟洲弱氣莫如山太華高敢問後言休退有自慙魚餌釣鯨鼇鸛雀樓避暑鸛雀樓頭不暑天南來輕吹貫心田一廛塵土離身外千里山河到眼前卧飲清風心醉道坐忘濁境性安禪中條山色半殘照紅翠連線接暮煙遊山菴清迥山菴煙靄中雲封幽徑水西東雨餘澗畔猿攀果日暖松梢鶴唳風栽藥畦中勤老叟採芝嵓下戲髫童他年撇却人間事氣吐虹霓返太空晚年述懷白髮簪冠百不宜日常睡早起還遲月圓月缺幾經見誰辱誰榮總不知閑說箇中君子話狂吟方外道人詩一生不問浮生計除此無爲總不爲誡慳貪恃勢非理貪求甚太過心頭網罟苦收羅暑寒尚被四時換晝夜猶隨二至那塡海勢摧徐福笑拔山力盡子房歌莫言得失由人造數到頭來無奈何警參道藉明師指到頭他人公案又搜求登天必假登天隥過海須憑過海舟萬物生成從本發羣波蕩漾自源流鄙哉蟻慕盲修者癡燕猖狂戲蜃樓還鄉作昔年訪道走西東今日簞瓢復里中但可卷懷藏進取不堪開口論窮通人情冷暖香騰别世事興衰總不同多少狐裘貂帽輩霸陵消息氣雄雄勸門人服勞積福塵勞苦莫辭欲高須以下爲基營爲不礙乾坤合動作何妨日月移圓覺四禪依次定陰符三盜自相宜一眞不昧從終始久久無中養就兒中秋夜風開雲幕正中秋拉友携琴宴小樓檀屑滿拈添瓦鼎荻簾高捲掛銀鈎喜觀天面十分月豈惹人間半點愁飲醉西風忘彼此不離眼底看瀛洲贈趙録判常道無爲玄且妙世人多欲觀邊徼迷流分派昧眞源直志除斜撮正要上士聞之信又行下愚得也誣更笑是以洪波懶擲鈎巨鼇魚餌知難釣悟眞集卷上
